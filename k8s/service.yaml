apiVersion: v1
kind: Service
metadata:
  name: heart-disease-app
  labels:
    app: heart-disease-app
spec:
  type: NodePort
  selector:
    app: heart-disease-app
  ports:
    - name: flask-ui
      protocol: TCP
      port: 80
      targetPort: 5000
      nodePort: 30080
    - name: fastapi
      protocol: TCP
      port: 8000
      targetPort: 8000
      nodePort: 30800
