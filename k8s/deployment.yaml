apiVersion: apps/v1
kind: Deployment
metadata:
  name: heart-disease-app
  labels:
    app: heart-disease-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: heart-disease-app
  template:
    metadata:
      labels:
        app: heart-disease-app
    spec:
      containers:
        - name: heart-disease-app
          image: rahma147/heart-disease-app:latest
          imagePullPolicy: Always
          ports:
            - name: fastapi
              containerPort: 8000
            - name: flask
              containerPort: 5000
          resources:
            requests:
              memory: "512Mi"
              cpu: "300m"
            limits:
              memory: "1Gi"
              cpu: "800m"
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 40
            periodSeconds: 20
          env:
            - name: FLASK_ENV
              value: "production"
