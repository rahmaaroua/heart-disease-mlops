data:
  test_size: 0.2
  random_state: 42
  target_column: num

preprocessing:
  scale_features: true
  handle_missing: median

logistic_regression:
  C: [0.01, 0.1, 1, 10, 100]
  max_iter: 1000

random_forest:
  n_estimators: [100, 200]
  max_depth: [4, 6, null]
  min_samples_split: [2, 5]

xgboost:
  n_estimators: [100, 200]
  max_depth: [3, 5]
  learning_rate: [0.05, 0.1]
  subsample: [0.8, 1.0]

evaluation:
  primary_metric: f1
  min_f1_threshold: 0.70
