name: Heart Disease MLOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/heart-disease-app

jobs:
  # ── Job 1: Train & Evaluate ─────────────────────────────────────────────────
  train-and-evaluate:
    name: Train & Evaluate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull data with DVC
        run: |
          dvc pull data/raw/heart_disease_uci.csv || echo "No remote — using committed data"

      - name: Run preprocessing
        run: python src/preprocess.py

      - name: Train all models
        run: python src/train.py

      - name: Check F1 threshold
        run: |
          python -c "
          import json, sys
          info = json.load(open('models/champion_info.json'))
          f1 = info['metrics']['f1']
          print(f'Champion: {info[\"champion\"]}  F1={f1}')
          if f1 < 0.70:
              print('FAIL: F1 below 0.70')
              sys.exit(1)
          print('PASS')
          "

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: |
            models/
            data/processed/scaler.joblib
            data/processed/feature_names.json
          retention-days: 30

  # ── Job 2: Build & Push Docker ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker
    needs: train-and-evaluate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: model-artifacts

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test Docker image
        run: |
          docker pull ${{ env.DOCKER_IMAGE }}:latest
          docker run -d -p 8000:8000 -p 5000:5000 --name test-app ${{ env.DOCKER_IMAGE }}:latest
          sleep 20
          curl -f http://localhost:8000/ || (docker logs test-app && exit 1)
          echo "Health check passed"
          docker stop test-app

  # ── Job 3: PR comment with results ─────────────────────────────────────────
  comment-results:
    name: Comment PR Results
    needs: train-and-evaluate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: model-artifacts

      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const info = JSON.parse(fs.readFileSync('models/champion_info.json','utf8'));
            const m = info.metrics;
            const all = info.all_models;
            let table = '| Model | Accuracy | Precision | Recall | F1 | ROC-AUC |\n|---|---|---|---|---|---|\n';
            for (const [name, res] of Object.entries(all)) {
              const mm = res.metrics;
              const star = name === info.champion ? ' ★' : '';
              table += `| ${name}${star} | ${mm.accuracy} | ${mm.precision} | ${mm.recall} | ${mm.f1} | ${mm.roc_auc} |\n`;
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## MLOps Pipeline Results\n\n**Champion:** ${info.champion}\n\n${table}\nDocker image: \`${{ env.DOCKER_IMAGE }}:latest\``
            });
